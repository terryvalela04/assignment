<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1" />  
  <title>GIVE US YOUR FEEDBACK</title>  
  <!-- Bootstrap CSS -->  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />  
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background-color: #6f4e37; /* coffee-brown */
      color: #fff; /* default text white */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main { flex: 1; }
    .feedback-message {
      display: none;
    }
    img.nav-logo {
      max-height: 60px;
      width: auto;
    }
    /* Fade in animation for the thank you message */
    .fade-in {
      animation: fadeInMessage 1s ease forwards;
    }
    @keyframes fadeInMessage {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav align-items-center w-100">
            <!-- Logo inside navbar -->
            <li class="nav-item mb-2 text-center w-100">
              <img
                src="https://github.com/terryvalela04/assignment/blob/main/Leonardo_Phoenix_10_A_stylized_modern_logo_featuring_the_words_3.jpg?raw=true"
                alt="Logo"
                class="img-fluid nav-logo"
              />
            </li>
            <!-- Nav links -->
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link active" href="Feedback.html">Feedback</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="container my-5">
    <h2 class="mb-4">Please give us your feedback below!</h2>

    <form id="feedbackForm">
      <div class="mb-3">
        <label for="nameInput" class="form-label">Name</label>
        <input type="text" class="form-control" id="nameInput" placeholder="Your Name" required />
      </div>

      <div class="mb-3">
        <label for="emailInput" class="form-label">Email address</label>
        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required />
      </div>

      <div class="mb-3">
        <label for="ratingSelect" class="form-label">Rating</label>
        <select class="form-select" id="ratingSelect" required>
          <option value="" disabled selected>Select rating</option>
          <option value="1">1 - Very Poor</option>
          <option value="2">2 - Poor</option>
          <option value="3">3 - Average</option>
          <option value="4">4 - Good</option>
          <option value="5">5 - Excellent</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="commentsTextarea" class="form-label">Comments</label>
        <textarea class="form-control" id="commentsTextarea" rows="4" placeholder="Your comments..." required></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Submit Feedback</button>
    </form>

    <div id="feedbackMessage" class="alert alert-success mt-4 feedback-message">
      Thank you for your feedback!
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center p-3">
    &copy; 2025 BIG STEPPA COFFEEHOUSE PASTRY AND BAKERY SHOP
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

  <!-- Feedback JS -->
  <script>
    const form = document.getElementById('feedbackForm');
    const msg = document.getElementById('feedbackMessage');

    form.addEventListener('submit', function(event) {
      event.preventDefault(); // prevent page reload
      msg.style.display = 'block'; 
      msg.classList.add('fade-in'); // fade-in animation
      form.reset(); // clear form fields
    });
  </script>

</body>
</html>

               alt="Logo" style="max-height:60px;" class="img-fluid">

          <span class="navbar-toggler-icon"></span>

          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

        </div>
      </div>
    </nav>
  </header>

  <!-- Feedback form -->
  <main class="container my-5">
    <h2 class="mb-4 text-center text-white">Please Give us Your Feedback below as we value it and Thank you!</h2>

    <!-- Formspree form -->
    <form action="https://formspree.io/f/mgebwqnj" method="POST">
      <div class="mb-3">
        <label for="nameInput" class="form-label text-white">Name</label>
        <input type="text" class="form-control" id="nameInput" name="name" placeholder="Your Name" required />
      </div>

      <div class="mb-3">
        <label for="emailInput" class="form-label text-white">Email address</label>
        <input type="email" class="form-control" id="emailInput" name="email" placeholder="name@example.com" required />
      </div>

      <div class="mb-3">
        <label for="ratingSelect" class="form-label text-white">Rating</label>
        <select class="form-select" id="ratingSelect" name="rating" required>
          <option value="" disabled selected>Select rating</option>
          <option value="1">1 - Very Poor</option>
          <option value="2">2 - Poor</option>
          <option value="3">3 - Average</option>
          <option value="4">4 - Good</option>
          <option value="5">5 - Excellent</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="commentsTextarea" class="form-label text-white">Comments</label>
        <textarea class="form-control" id="commentsTextarea" name="comments" rows="4" placeholder="Your comments..." required></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Submit Feedback</button>
    </form>

    <p class="mt-4 text-white text-center">Your feedback will be sent directly to our email.</p>
  </main>

  <footer class="bg-dark text-white text-center p-3">

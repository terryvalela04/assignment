<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My COFFEEHOUSE PASTRY AND BAKERY SHOP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
html, body {
  height: 100%;
  margin: 0;
}
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: linear-gradient(-45deg, #ffb347, #ffcc33);
  animation: fadeIn 2s ease forwards, colorFade 30s ease infinite;
  opacity: 0;
}
@keyframes fadeIn {
  to { opacity: 1; }
}
@keyframes colorFade {
  0% { background: linear-gradient(-45deg, #ffb347, #ffcc33); }
  20% { background: linear-gradient(-45deg, #d2691e, #ffa500); }
  40% { background: linear-gradient(-45deg, #ff7f50, #ffb347); }
  60% { background: linear-gradient(-45deg, #ff6347, #ffcc33); }
  80% { background: linear-gradient(-45deg, #ff4500, #ffa500); }
  100% { background: linear-gradient(-45deg, #ffb347, #ffcc33); }
}
.flex-grow-1 { flex: 1; }
</style>
</head>
<body>
<header class="text-center p-3">
  <h1>BIG STEPPA COFFEEHOUSE</h1>
</header>
<main class="flex-grow-1 d-flex justify-content-center align-items-center">
  <p class="fs-4 text-center text-dark">Welcome to our Coffeehouse, Pastry, and Bakery Shop!</p>
</main>
<footer class="bg-dark text-white text-center p-3">
  &copy; 2025 BIG STEPPA COFFEEHOUSE PASTRY AND BAKERY SHOP
</footer>
</body>
  </html>
